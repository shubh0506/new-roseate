<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal | Roseate Capital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0A0A09;--ink:#0D0D0C;--muted:rgba(255,255,255,.4);--border:rgba(255,255,255,.1);--gold:#B8924A;--gold2:#D4A85C;--surface:#141413;--green:#6FCF97}
body{background:var(--bg);color:#fff;font-family:'Inter',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
::selection{background:var(--gold);color:#fff}

nav{display:flex;align-items:center;justify-content:space-between;padding:1.5rem 2.5rem;border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;letter-spacing:.06em;text-transform:uppercase;color:#fff;text-decoration:none}
.nav-status{display:flex;align-items:center;gap:1.5rem}
.ns{display:flex;align-items:center;gap:.5rem;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.ns .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.portal-main{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem;position:relative;overflow:hidden}
.portal-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=1600&q=60&auto=format&fit=crop') center/cover no-repeat;opacity:.06}
.portal-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 30%,var(--bg) 80%)}

.portal-card{width:100%;max-width:440px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.75rem;position:relative;z-index:1;box-shadow:0 40px 100px rgba(0,0,0,.5)}
.plabel{font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold2);text-align:center;margin-bottom:.75rem}
.ptitle{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;text-transform:uppercase;letter-spacing:-.02em;text-align:center;margin-bottom:.5rem}
.psub{text-align:center;font-size:.78rem;color:var(--muted);margin-bottom:2rem;line-height:1.6}

.tabs{display:flex;gap:.4rem;background:rgba(255,255,255,.04);border-radius:100px;padding:.3rem;margin-bottom:2rem;border:1px solid var(--border)}
.tab{flex:1;text-align:center;padding:.6rem;font-size:.72rem;font-weight:500;letter-spacing:.05em;color:var(--muted);border-radius:100px;cursor:pointer;transition:all .25s}
.tab.active{background:var(--gold);color:#fff;font-weight:600}

.field{margin-bottom:1.1rem}
.field label{display:block;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.field input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:.85rem 1rem;font-family:'Inter',sans-serif;font-size:.88rem;color:#fff;font-weight:300;transition:border-color .2s,background .2s}
.field input:focus{outline:none;border-color:var(--gold);background:rgba(184,146,74,.06)}
.field input::placeholder{color:rgba(255,255,255,.2)}

.portal-btn{width:100%;background:var(--gold);color:#fff;border:none;border-radius:100px;padding:.95rem;font-family:'Syne',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .25s;margin-top:.5rem}
.portal-btn:hover{background:var(--gold2);transform:translateY(-1px);box-shadow:0 8px 24px rgba(184,146,74,.3)}
.portal-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:var(--muted);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.google-btn{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:100px;padding:.85rem;font-size:.78rem;color:#fff;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.7rem;font-family:'Inter',sans-serif}
.google-btn:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.2)}
.google-btn svg{width:18px;height:18px}

.reset-link{display:block;text-align:center;margin-top:1.25rem;font-size:.72rem;color:var(--muted);text-decoration:none;transition:color .2s}
.reset-link:hover{color:var(--gold2)}
.pane{display:none}.pane.active{display:block}

.msg{padding:.75rem 1rem;border-radius:8px;font-size:.78rem;margin-bottom:1rem;display:none}
.msg.error{background:rgba(192,83,63,.15);border:1px solid rgba(192,83,63,.3);color:#e07060}
.msg.success{background:rgba(111,207,151,.1);border:1px solid rgba(111,207,151,.25);color:var(--green)}
.msg.show{display:block}

.portal-footer{text-align:center;padding:2rem;font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.15)}

@media(max-width:480px){.portal-card{padding:2rem 1.5rem}}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="../index.html">Roseate Capital</a>
  <div class="nav-status">
    <div class="ns"><span class="dot"></span>Secure Connection</div>
    <div class="ns">256-bit Encrypted</div>
  </div>
</nav>

<div class="portal-main">
  <div class="portal-bg"></div>
  <div class="portal-card">
    <div class="plabel">// Secure Member Interface</div>
    <div class="ptitle">Client Portal</div>
    <p class="psub">Access your portfolio, statements, and performance reports.</p>

    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
    </div>

    <div class="msg" id="msg"></div>

    <!-- LOGIN -->
    <div class="pane active" id="login">
      <div class="field"><label>Email Address</label><input type="email" id="login-email" placeholder="you@email.com" autocomplete="email"></div>
      <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="portal-btn" id="login-btn" onclick="handleLogin()">Login to Dashboard</button>
      <div class="divider">Or Continue With</div>
      <button class="google-btn" onclick="handleGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <a href="#" class="reset-link" onclick="handleReset(event)">Forgot your password?</a>
    </div>

    <!-- REGISTER -->
    <div class="pane" id="register">
      <div class="field"><label>Full Legal Name</label><input type="text" id="reg-name" placeholder="Your full name" autocomplete="name"></div>
      <div class="field"><label>Email Address</label><input type="email" id="reg-email" placeholder="you@email.com" autocomplete="email"></div>
      <div class="field"><label>Password</label><input type="password" id="reg-pass" placeholder="Min. 8 characters" autocomplete="new-password"></div>
      <div class="field"><label>Confirm Password</label><input type="password" id="reg-pass2" placeholder="••••••••" autocomplete="new-password"></div>
      <button class="portal-btn" id="reg-btn" onclick="handleRegister()">Create Account</button>
      <div class="divider">Or Register With</div>
      <button class="google-btn" onclick="handleGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>
  </div>
</div>

<div class="portal-footer">© 2026 Roseate Capital — End-to-End Encrypted</div>

<script>
const SUPABASE_URL = 'https://eyyqtuyyuycoaoyrropj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5eXF0dXl5dXljb2FveXJyb3BqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjMwMzQsImV4cCI6MjA5NjkzOTAzNH0.WnNxn2jmUdngriqWyB59Ofg_D_cRXkACFeu9glIaGSc';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Redirect if already logged in
sb.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href='dashboard.html';
});

function switchTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById(t).classList.add('active');
  clearMsg();
}

function showMsg(text,type='error'){
  const el=document.getElementById('msg');
  el.textContent=text;
  el.className='msg '+type+' show';
}
function clearMsg(){
  const el=document.getElementById('msg');
  el.className='msg';
}

async function handleLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const btn=document.getElementById('login-btn');
  if(!email||!pass){showMsg('Please fill in all fields.');return;}
  btn.disabled=true;btn.textContent='Logging in...';
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){showMsg(error.message);btn.disabled=false;btn.textContent='Login to Dashboard';}
  else{showMsg('Success! Redirecting…','success');setTimeout(()=>window.location.href='dashboard.html',800);}
}

async function handleRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value;
  const pass2=document.getElementById('reg-pass2').value;
  const btn=document.getElementById('reg-btn');
  if(!name||!email||!pass){showMsg('Please fill in all fields.');return;}
  if(pass!==pass2){showMsg('Passwords do not match.');return;}
  if(pass.length<8){showMsg('Password must be at least 8 characters.');return;}
  btn.disabled=true;btn.textContent='Creating account...';
  const {data:authData,error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
  if(error){showMsg(error.message);btn.disabled=false;btn.textContent='Create Account';}
  else{
    // Auto-create client_profiles row so admin can see this client immediately
    try{
      await sb.from('client_profiles').upsert({
        user_id:authData?.user?.id||email,
        email,full_name:name,status:'active',created_at:new Date().toISOString(),updated_at:new Date().toISOString()
      },{onConflict:'email',ignoreDuplicates:true});
    }catch(e){/* non-fatal */}
    showMsg('Account created! Check your email to confirm, then log in.','success');
    btn.disabled=false;btn.textContent='Create Account';
  }
}

async function handleGoogle(){
  await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin+'/pages/dashboard.html'}});
}

async function handleReset(e){
  e.preventDefault();
  const email=document.getElementById('login-email').value.trim();
  if(!email){showMsg('Enter your email address first.');return;}
  const {error}=await sb.auth.resetPasswordForEmail(email);
  if(error)showMsg(error.message);
  else showMsg('Password reset email sent!','success');
}

// Enter key support
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const active=document.querySelector('.pane.active').id;
    if(active==='login')handleLogin();
    else handleRegister();
  }
});
</script>
</body>
</html>
